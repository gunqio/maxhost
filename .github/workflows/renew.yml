name: Maxhost 自动续期服务

# 触发条件配置
on:
  schedule:
    # 定时任务：每天北京时间早上 08:00 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 开启手动触发按钮

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      # 1. 🌟【已修改】：使用 PAT 令牌跨仓库拉取你的私有仓库代码
      - name: 检出私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: 'gunqio/zhiyong' # 你的私库地址
          token: ${{ secrets.GH_PAT }}   # 访问私库必备的授权令牌

      # 2. 部署 Python 运行环境
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装自动化核心依赖 Playwright 及配套的 Chromium 浏览器
      - name: 安装依赖与自动化浏览器
        run: |
          pip install playwright
          playwright install chromium

      # 4. 从变量中动态读取 JSON 并启动 Xray 转换核心
      - name: 启动本地 Xray 转换代理
        env:
          XRAY_CONFIG_DATA: ${{ secrets.XRAY_CONFIG_JSON }}
        run: |
          curl -L -s https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip xray
          chmod +x xray
          echo "$XRAY_CONFIG_DATA" > xray_config.json
          ./xray run -c xray_config.json > /dev/null 2>&1 &
          sleep 3

      # 5. 核心：注入 Secrets 隐私变量并执行续期脚本
      - name: 运行续期脚本
        env:
          MAXHOST_EMAIL: ${{ secrets.MAXHOST_EMAIL }}
          MAXHOST_PASSWORD: ${{ secrets.MAXHOST_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          MAXHOST_COOKIES: ${{ secrets.MAXHOST_COOKIES }}
        run: python maxhost.py # 🌟【已修改】：脚本文件名已改为 maxhost.py

      # 6. 如果运行失败，把错误截图上传到 GitHub 方便你排查
      - name: 上传错误/运行截图 (仅保留 3 天)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-screenshots
          path: |
            *.png
          retention-days: 3
